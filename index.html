<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #f5f5f5;
    font-family: Arial;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 60px;
    text-align: center;
  }

  .letter {
    font-size: 120px;
    color: red;
    font-weight: bold;
    opacity: 0;
    transform: scale(0.5);
    transition: all 0.3s;
  }

  .show {
    opacity: 1;
    transform: scale(1);
  }
</style>
</head>
<body>

<div class="grid" id="grid"></div>

<script>
const letters = ["q","p","a","b","c"];
let currentIndex = 0;

const total = 12; // 4 hàng x 3 cột

const grid = document.getElementById("grid");

// tạo sẵn ô
for (let i = 0; i < total; i++) {
  const div = document.createElement("div");
  div.className = "letter";
  grid.appendChild(div);
}

const elements = document.querySelectorAll(".letter");

let index = 0;

function showNext() {
  const currentLetter = letters[currentIndex];

  // reset vòng
  if (index === 0) {
    elements.forEach(el => {
      el.classList.remove("show");
      el.innerText = "";
    });
  }

  elements[index].innerText = currentLetter;
  elements[index].classList.add("show");

  index++;

  // xong 12 chữ → đổi chữ
  if (index >= elements.length) {
    index = 0;
    currentIndex = (currentIndex + 1) % letters.length;
  }
}

// tốc độ
setInterval(showNext, 600);
</script>

</body>
</html>
